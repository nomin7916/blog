<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — My Insight Blog (Drive CMS)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #131316; --card: #1a1a1e;
      --border: #252529; --border2: #2e2e34;
      --accent: #6366f1; --accent-light: #818cf8;
      --text: #e5e7eb; --muted: #6b7280;
      --success: #10b981; --warning: #f59e0b; --error: #ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(13,13,15,.93); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: .6rem; text-decoration: none; }
    .logo-icon { width: 26px; height: 26px; background: linear-gradient(135deg,#6366f1,#a78bfa); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
    .logo-text { font-size: .9rem; font-weight: 700; color: #fff; }
    .badge { font-size: .7rem; font-weight: 600; padding: .25rem .65rem; border-radius: 9999px; background: rgba(99,102,241,.15); color: var(--accent-light); border: 1px solid rgba(99,102,241,.3); }
    .btn-back { font-size: .8rem; color: var(--muted); text-decoration: none; border: 1px solid var(--border); border-radius: 9999px; padding: .3rem .8rem; transition: all .15s; }
    .btn-back:hover { color: var(--text); border-color: var(--border2); }

    .status-bar { max-width: 1200px; margin: 0 auto; padding: .6rem 1.5rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .status-pill { display: inline-flex; align-items: center; gap: .4rem; font-size: .75rem; font-weight: 600; padding: .3rem .75rem; border-radius: 9999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: default; }
    .status-pill.ok { color: var(--success); border-color: rgba(16,185,129,.35); background: rgba(16,185,129,.08); }
    .status-pill.warn { color: var(--warning); border-color: rgba(245,158,11,.35); background: rgba(245,158,11,.08); cursor: pointer; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .main-wrap { max-width: 1200px; margin: 0 auto; padding: .75rem 1.5rem 5rem; display: grid; grid-template-columns: 1fr 420px; gap: 1.75rem; }
    @media (max-width: 900px) { .main-wrap { grid-template-columns: 1fr; } }

    .section-title { font-size: .7rem; font-weight: 700; letter-spacing: .08em; color: var(--muted); text-transform: uppercase; margin-bottom: .85rem; }
    .panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.4rem; margin-bottom: 1.25rem; }
    .form-group { margin-bottom: 1.15rem; }
    label { display: block; font-size: .75rem; font-weight: 600; color: var(--muted); margin-bottom: .4rem; letter-spacing: .03em; }
    input[type="text"], input[type="date"], textarea, select { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .6rem .85rem; font-size: .875rem; color: var(--text); font-family: inherit; outline: none; }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: .4; }

    .tags-container { display: flex; flex-wrap: wrap; gap: .4rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: .5rem .75rem; min-height: 44px; cursor: text; }
    .tags-container:focus-within { border-color: var(--accent); }
    .tag-chip { display: inline-flex; align-items: center; gap: .3rem; background: rgba(99,102,241,.18); color: var(--accent-light); border: 1px solid rgba(99,102,241,.3); border-radius: 9999px; padding: .2rem .65rem; font-size: .75rem; font-weight: 500; }
    .tag-chip button { background: none; border: none; cursor: pointer; color: var(--accent-light); font-size: .85rem; line-height: 1; padding: 0; opacity: .7; }
    .tag-input-inner { border: none; background: none; outline: none; font-size: .8rem; color: var(--text); flex: 1; padding: .15rem 0; }
    
    .attach-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); padding: .4rem .6rem; border-radius: 8px; font-size: .8rem; margin-bottom:.3rem; }
    .attach-item-title { font-weight: 600; color: var(--text); white-space: nowrap; margin-right:.5rem; }
    .attach-item-url { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex:1; }

    .source-toggle { display: flex; gap: .35rem; margin-bottom: 1rem; }
    .src-btn { flex: 1; padding: .55rem; border-radius: 9px; font-size: .8rem; font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); }
    .src-btn.active { background: rgba(99,102,241,.18); color: var(--accent-light); border-color: rgba(99,102,241,.4); }

    .btn-primary { width: 100%; padding: .8rem; background: linear-gradient(135deg,#6366f1,#7c3aed); color: #fff; border: none; border-radius: 12px; font-size: .9rem; font-weight: 700; cursor: pointer; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary { padding: .5rem 1rem; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; }

    .post-item { padding: .9rem 1rem; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); margin-bottom: .5rem; }
    .post-item.post-hidden { opacity: .55; }
    .post-item-top { display: flex; justify-content: space-between; gap: .65rem; }
    .post-info { flex: 1; min-width: 0; }
    .post-title-sm { font-size: .85rem; font-weight: 600; color: var(--text); margin-bottom: .3rem; }
    .post-actions { display: flex; gap: .35rem; flex-shrink: 0; }
    .btn-action { padding: .28rem .6rem; border-radius: 7px; font-size: .72rem; font-weight: 600; border: 1px solid var(--border); background:var(--surface); color:var(--text); cursor: pointer; }

    .editor-toolbar { display: flex; align-items: center; gap: .2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px 10px 0 0; padding: .45rem .6rem; }
    .tb-btn { padding: .3rem .52rem; border-radius: 6px; font-size: .78rem; font-weight: 700; background: none; color: var(--muted); cursor: pointer; border:none; }
    .tb-btn:hover { background: var(--card); color: var(--text); }
    .write-editor-area { min-height: 340px; background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; padding: 1rem 1.15rem; font-size: .9rem; line-height: 1.8; color: var(--text); outline: none; overflow-y: auto; }
    .write-editor-area iframe { max-width: 100%; border-radius: 8px; }
    .write-editor-area a { color: var(--accent-light); text-decoration: underline; }

    .overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(13,13,15,.93); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 1rem; }
    .overlay.show { display: flex; }
    .overlay-box { background: var(--card); border-radius: 20px; padding: 2rem; max-width: 580px; width: 100%; border: 1px solid var(--border); max-height:90vh; overflow-y:auto; }
  </style>
</head>
<body>

<header>
  <a href="Index.html" class="logo">
    <div class="logo-icon">M</div>
    <span class="logo-text">My Insight Blog <span style="font-size:0.7rem; color:var(--success);">(Drive CMS)</span></span>
  </a>
  <div style="display:flex;align-items:center;gap:.6rem;">
    <span class="badge">Admin</span>
    <a href="Index.html" class="btn-back">← 블로그</a>
  </div>
</header>

<div class="status-bar" style="padding-top:.85rem;">
  <span class="status-pill warn" id="drive-pill" onclick="gdSignIn()">
    <span class="status-dot"></span><span id="drive-pill-text">Drive 로그인 필요</span>
  </span>
  <span id="posts-count-pill" class="status-pill" style="cursor:default;">
    <span class="status-dot"></span><span id="posts-count-text">데이터 로딩 대기중...</span>
  </span>
</div>

<div class="main-wrap">
  <div>
    <div class="source-toggle">
      <button class="src-btn active" id="src-write-btn" onclick="switchSource('write')">✏️ 직접 작성</button>
      <button class="src-btn" id="src-local-btn" onclick="switchSource('local')">📄 PC HTML 업로드</button>
    </div>

    <!-- 직접 작성 패널 -->
    <div id="src-write-panel" class="panel">
      <div class="form-group"><label>제목 *</label><input type="text" id="w-title" oninput="checkWriteReady()" /></div>
      <div class="form-group"><label>날짜 *</label><input type="date" id="w-date" oninput="checkWriteReady()" /></div>
      <div class="form-group"><label>설명 요약</label><input type="text" id="w-desc" /></div>
      <div class="form-group">
        <label>태그</label>
        <div class="tags-container" onclick="document.getElementById('w-tag-input').focus()">
          <div id="w-tags-list" style="display:contents;"></div>
          <input type="text" id="w-tag-input" class="tag-input-inner" placeholder="입력 후 Enter" onkeydown="handleTagInput(event, 'w')" />
        </div>
      </div>
      <div class="form-group">
        <label>외부 첨부파일 / 관련 링크 추가</label>
        <div style="display:flex;gap:.5rem;margin-bottom:.5rem;">
          <input type="text" id="w-attach-title" placeholder="버튼 이름 (예: 리포트 다운)" style="width:30%;" />
          <input type="text" id="w-attach-url" placeholder="https://..." style="flex:1;" />
          <button class="btn-secondary" onclick="addAttachment('w')">추가</button>
        </div>
        <div id="w-attachments-list"></div>
      </div>

      <p class="section-title">본문 작성</p>
      <div class="editor-toolbar">
        <button class="tb-btn" onclick="execCmd('bold')"><b>B</b></button>
        <button class="tb-btn" onclick="execCmd('formatBlock', 'h2')">H2</button>
        <button class="tb-btn" onclick="execCmd('formatBlock', 'p')">¶</button>
        <div style="width:1px;height:18px;background:var(--border);margin:0 .3rem;"></div>
        <button class="tb-btn" style="color:var(--accent-light);" onclick="insertYoutube('w')">▶️ 본문에 유튜브 삽입</button>
      </div>
      <div id="write-editor" class="write-editor-area" contenteditable="true" onkeyup="checkAutoLink(event)"></div>

      <button class="btn-primary" id="write-publish-btn" onclick="publishWritePost()" style="margin-top:1.5rem;" disabled>🚀 Drive에 게시하기</button>
    </div>

    <!-- 로컬 파일 패널 -->
    <div id="src-local-panel" class="panel" style="display:none;">
      <p class="section-title">PC에서 완성된 HTML 파일 업로드</p>
      <div style="border: 2px dashed var(--border2); border-radius: 14px; padding: 2rem; text-align: center; cursor: pointer;" onclick="document.getElementById('u-file-input').click()">
        클릭해서 HTML 파일 선택
      </div>
      <input type="file" id="u-file-input" accept=".html,.htm" style="display:none;" onchange="handleLocalFile(this.files[0])" />
      <div id="publish-form" style="display:none; margin-top:1rem;">
        <div style="color:var(--accent-light); margin-bottom:1rem;" id="selected-file-name"></div>
        <button class="btn-primary" id="f-publish-btn" onclick="publishLocalPost()">업로드 및 게시</button>
      </div>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="section-title">게시된 글 관리 (Drive)</div>
      <div id="m-posts-list"><div class="empty-state">로딩 대기중...</div></div>
    </div>
  </div>
</div>

<!-- 수정 모달 -->
<div class="overlay" id="edit-overlay">
  <div class="overlay-box">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem;">
      <h3 style="color:#fff;">글 수정</h3>
      <button onclick="closeOverlay('edit-overlay')" style="background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;">✕</button>
    </div>
    <div class="form-group"><label>제목</label><input type="text" id="e-title" /></div>
    <div class="form-group"><label>날짜</label><input type="date" id="e-date" /></div>
    <div class="form-group"><label>설명</label><textarea id="e-desc"></textarea></div>
    <div class="form-group">
      <label>태그</label>
      <div class="tags-container" onclick="document.getElementById('e-tag-input').focus()">
        <div id="e-tags-list" style="display:contents;"></div>
        <input type="text" id="e-tag-input" class="tag-input-inner" onkeydown="handleTagInput(event, 'e')" />
      </div>
    </div>
    <div class="form-group">
      <label>첨부파일 및 링크</label>
      <div style="display:flex;gap:.5rem;margin-bottom:.5rem;">
        <input type="text" id="e-attach-title" placeholder="제목" style="width:30%;" />
        <input type="text" id="e-attach-url" placeholder="https://..." style="flex:1;" />
        <button class="btn-secondary" onclick="addAttachment('e')">추가</button>
      </div>
      <div id="e-attachments-list"></div>
    </div>
    
    <label style="margin-top:1.5rem;">본문 편집</label>
    <div class="editor-toolbar">
      <button class="tb-btn" onclick="execCmdEdit('bold')"><b>B</b></button>
      <button class="tb-btn" onclick="execCmdEdit('formatBlock', 'h2')">H2</button>
      <button class="tb-btn" onclick="execCmdEdit('formatBlock', 'p')">¶</button>
      <div style="width:1px;height:18px;background:var(--border);margin:0 .3rem;"></div>
      <button class="tb-btn" style="color:var(--accent-light);" onclick="insertYoutube('e')">▶️ 본문에 유튜브 삽입</button>
    </div>
    <div id="e-editor" class="write-editor-area" contenteditable="true" onkeyup="checkAutoLink(event)"></div>
    
    <button class="btn-primary" onclick="saveEdit()" style="margin-top:1.5rem;">변경사항 저장</button>
  </div>
</div>

<script>
// API 및 상태
const GD_CLIENT_ID = '1094703739324-gp9ln7ghnh61lak10or45koh01tu121r.apps.googleusercontent.com';
const GD_FOLDER_ID = '1CSlRvNALl15uFVR1VA1yETVxQRWwU9Z1';
const GD_SCOPE = 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.metadata.readonly';

let gdAccessToken = sessionStorage.getItem('gd_admin_token') || null;
let gdTokenClient = null;
let currentPosts = [];
let tagsData = { w: [], e: [] };
let attachmentsData = { w: [], e: [] };
let editingPostIndex = -1;
let selectedLocalFile = null;

// 시작
window.onload = () => {
  document.getElementById('w-date').value = new Date().toISOString().split('T')[0];
  if (gdAccessToken) {
    updateGDAuthUI(true);
    loadPostsJsonFromDrive();
  }
};

// 로그인
function gdSignIn() {
  if (!window.google) return alert('Google API 로딩중입니다.');
  gdTokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GD_CLIENT_ID, scope: GD_SCOPE,
    callback: (res) => {
      if (res.error) return alert('로그인 실패');
      gdAccessToken = res.access_token;
      sessionStorage.setItem('gd_admin_token', gdAccessToken);
      updateGDAuthUI(true);
      loadPostsJsonFromDrive();
    },
  });
  gdTokenClient.requestAccessToken({ prompt: '' });
}

function updateGDAuthUI(isSignedIn) {
  document.getElementById('drive-pill').className = isSignedIn ? 'status-pill ok' : 'status-pill warn';
  document.getElementById('drive-pill-text').textContent = isSignedIn ? 'Drive 연동 완료' : 'Drive 로그인 필요';
}

// Drive API
async function gdApiCall(url, options = {}) {
  options.headers = { ...options.headers, Authorization: `Bearer ${gdAccessToken}` };
  const res = await fetch(url, options);
  if (!res.ok) throw new Error(`API Error: ${res.status}`);
  return res;
}

async function getDriveFileId(filename) {
  const q = encodeURIComponent(`name='${filename}' and '${GD_FOLDER_ID}' in parents and trashed=false`);
  const res = await gdApiCall(`https://www.googleapis.com/drive/v3/files?q=${q}`);
  const data = await res.json();
  return data.files && data.files.length > 0 ? data.files[0].id : null;
}

async function uploadToDrive(filename, content, mimeType) {
  const fileId = await getDriveFileId(filename);
  const boundary = '-------314159265358979323846';
  const delimiter = "\r\n--" + boundary + "\r\n";
  const close_delim = "\r\n--" + boundary + "--";
  const metadata = { name: filename, mimeType };
  if (!fileId) metadata.parents = [GD_FOLDER_ID];
  const multipartBody = delimiter + 'Content-Type: application/json; charset=UTF-8\r\n\r\n' + JSON.stringify(metadata) + delimiter + 'Content-Type: ' + mimeType + '\r\n\r\n' + content + close_delim;
  const url = fileId ? `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart` : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
  await gdApiCall(url, { method: fileId ? 'PATCH' : 'POST', headers: { 'Content-Type': `multipart/related; boundary=${boundary}` }, body: multipartBody });
}

// 데이터 마이그레이션 및 로드
async function loadPostsJsonFromDrive() {
  document.getElementById('posts-count-text').textContent = '데이터 로딩 중...';
  try {
    const fileId = await getDriveFileId('posts.json');
    if (fileId) {
      const res = await gdApiCall(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      currentPosts = await res.json();
    } else {
      // Drive에 posts.json이 없다면 Vercel(GitHub)에 있는 기존 데이터를 가져와서 Drive에 저장 (마이그레이션)
      const res = await fetch('posts.json');
      if(res.ok) currentPosts = await res.json();
      else currentPosts = [];
    }
    
    // 데이터 구조 자동 정리
    currentPosts = currentPosts.map(p => {
      if (p.link && (!p.attachments || p.attachments.length === 0)) {
        p.attachments = [{ title: '관련 링크', url: p.link }];
        delete p.link;
      }
      if(!p.attachments) p.attachments = [];
      return p;
    });

    if(!fileId && currentPosts.length > 0) {
      await uploadToDrive('posts.json', JSON.stringify(currentPosts, null, 2), 'application/json');
    }

    renderManageList();
    document.getElementById('posts-count-text').textContent = `총 ${currentPosts.length}개`;
  } catch(e) {
    document.getElementById('posts-count-text').textContent = '로드 실패: ' + e.message;
  }
}

async function savePostsToDrive() {
  await uploadToDrive('posts.json', JSON.stringify(currentPosts, null, 2), 'application/json');
  renderManageList();
}

// 탭 전환
function switchSource(src) {
  document.getElementById('src-write-btn').classList.toggle('active', src==='write');
  document.getElementById('src-local-btn').classList.toggle('active', src==='local');
  document.getElementById('src-write-panel').style.display = src==='write'?'block':'none';
  document.getElementById('src-local-panel').style.display = src==='local'?'block':'none';
}

// 태그 / 첨부파일
function handleTagInput(e, p) {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault(); const v = e.target.value.trim().replace(',', '');
    if (v && !tagsData[p].includes(v)) { tagsData[p].push(v); renderTags(p); }
    e.target.value = '';
  }
}
function removeTag(p, i) { tagsData[p].splice(i,1); renderTags(p); }
function renderTags(p) { document.getElementById(`${p}-tags-list`).innerHTML = tagsData[p].map((t,i) => `<span class="tag-chip">${t}<button type="button" onclick="removeTag('${p}',${i})">×</button></span>`).join(''); }

function addAttachment(p) {
  const tEl = document.getElementById(`${p}-attach-title`), uEl = document.getElementById(`${p}-attach-url`);
  const t = tEl.value.trim() || '링크', u = uEl.value.trim();
  if(!u) return; attachmentsData[p].push({title:t, url:u});
  tEl.value=''; uEl.value=''; renderAttachments(p);
}
function removeAttachment(p, i) { attachmentsData[p].splice(i,1); renderAttachments(p); }
function renderAttachments(p) {
  document.getElementById(`${p}-attachments-list`).innerHTML = attachmentsData[p].map((a,i) => `
    <div class="attach-item"><div class="attach-item-info"><span>🔗</span><span class="attach-item-title">${a.title}</span><span class="attach-item-url">${a.url}</span></div>
    <button class="btn-action" onclick="removeAttachment('${p}',${i})">삭제</button></div>
  `).join('');
}

// 에디터 도구
function execCmd(cmd, val) { document.getElementById('write-editor').focus(); document.execCommand(cmd, false, val); }
function execCmdEdit(cmd, val) { document.getElementById('e-editor').focus(); document.execCommand(cmd, false, val); }

function insertYoutube(target) {
  const url = prompt("유튜브 URL을 붙여넣어주세요:\n(예: https://www.youtube.com/watch?v=...)");
  if(!url) return;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(m) {
    const html = `<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin:1.25rem 0;background:#000;"><iframe src="https://www.youtube.com/embed/${m[1]}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px;" allowfullscreen></iframe></div><br>`;
    const ed = document.getElementById(target === 'w' ? 'write-editor' : 'e-editor');
    ed.focus(); document.execCommand('insertHTML', false, html);
  } else alert("올바른 유튜브 링크가 아닙니다.");
}

function checkAutoLink(e) {
  if (e.key === ' ' || e.key === 'Enter') {
    const sel = window.getSelection(); if (!sel.isCollapsed) return;
    const range = sel.getRangeAt(0); const textNode = range.startContainer;
    if (textNode.nodeType !== Node.TEXT_NODE) return;
    const text = textNode.textContent, offset = range.startOffset;
    const match = text.slice(0, offset).match(/(https?:\/\/[^\s]+)$/);
    if (match) {
      range.setStart(textNode, offset - match[0].length); range.setEnd(textNode, offset);
      sel.removeAllRanges(); sel.addRange(range);
      document.execCommand('createLink', false, match[0]);
      sel.collapseToEnd();
    }
  }
}

// 작성/등록
function checkWriteReady() {
  document.getElementById('write-publish-btn').disabled = !(document.getElementById('w-title').value.trim() && document.getElementById('w-date').value);
}

function buildHtmlFile(title, date, bodyContent) {
  return `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${title}</title><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" /><style>body{background:#121212;color:#e5e7eb;font-family:'Pretendard',sans-serif;line-height:1.8;padding:2rem 1rem 4rem}.post-wrap{max-width:760px;margin:0 auto}.post-header{margin-bottom:2.5rem;border-bottom:1px solid #252529;padding-bottom:1.5rem}.post-title{font-size:1.85rem;font-weight:800;color:#f3f4f6;margin-bottom:0.75rem}.post-date{font-size:0.8rem;color:#6b7280;margin-bottom:0.6rem}.post-body{font-size:0.95rem}</style></head><body><div class="post-wrap"><div class="post-header"><div class="post-date">${date}</div><h1 class="post-title">${title}</h1></div><div class="post-body">${bodyContent}</div></div></body></html>`;
}

async function publishWritePost() {
  const btn = document.getElementById('write-publish-btn'); btn.disabled=true; btn.textContent='업로드 중...';
  try {
    const title = document.getElementById('w-title').value.trim(), date = document.getElementById('w-date').value;
    const htmlContent = buildHtmlFile(title, date, document.getElementById('write-editor').innerHTML);
    const filename = `posts/${date}-${title.replace(/\s+/g,'-')}.html`;
    
    await uploadToDrive(filename, htmlContent, 'text/html');
    currentPosts.unshift({ date, title, description: document.getElementById('w-desc').value, file: filename, tags: [...tagsData.w], attachments: [...attachmentsData.w], visible: true });
    await savePostsToDrive();

    alert('게시 완료!');
    document.getElementById('w-title').value=''; document.getElementById('w-desc').value=''; document.getElementById('write-editor').innerHTML='';
    tagsData.w=[]; renderTags('w'); attachmentsData.w=[]; renderAttachments('w');
  } catch(e) { alert('오류: ' + e.message); }
  btn.disabled=false; btn.textContent='🚀 Drive에 게시하기';
}

function handleLocalFile(file) {
  if(!file) return; selectedLocalFile = file;
  document.getElementById('selected-file-name').textContent = file.name;
  document.getElementById('publish-form').style.display = 'block';
}

async function publishLocalPost() {
  if(!selectedLocalFile) return;
  try {
    const content = await selectedLocalFile.text();
    const filename = `posts/${selectedLocalFile.name}`;
    await uploadToDrive(filename, content, 'text/html');
    
    const dateMatch = filename.match(/^posts\/(\d{4}-\d{2}-\d{2})/);
    const date = dateMatch ? dateMatch[1] : new Date().toISOString().split('T')[0];
    const title = selectedLocalFile.name.replace(/\.html?$/i, '').replace(/^\d{4}-\d{2}-\d{2}-/,'');
    
    currentPosts.unshift({ date, title, description: '', file: filename, tags: [], attachments: [], visible: true });
    await savePostsToDrive();
    alert('업로드 완료!');
    document.getElementById('publish-form').style.display = 'none';
  } catch(e) { alert('오류: '+e.message); }
}

// 리스트 관리 및 수정
function renderManageList() {
  const el = document.getElementById('m-posts-list');
  if(!currentPosts.length) return el.innerHTML = '<div class="empty-state">게시글이 없습니다.</div>';
  el.innerHTML = currentPosts.map((p, idx) => {
    const isHidden = p.visible === false;
    return `<div class="post-item${isHidden ? ' post-hidden' : ''}"><div class="post-item-top"><div class="post-info"><div class="post-title-sm">${p.title}</div><div style="font-size:0.7rem;color:var(--muted);">${p.date}</div></div><div class="post-actions">
      <button class="btn-action" onclick="toggleVis(${idx})">${isHidden ? '👁 표시' : '🙈 숨김'}</button>
      <button class="btn-action" onclick="openEdit(${idx})" style="color:var(--accent-light);">✏️ 수정</button>
      <button class="btn-action" onclick="deletePost(${idx})" style="color:var(--error);">🗑️ 삭제</button>
    </div></div></div>`;
  }).join('');
}

async function toggleVis(idx) { currentPosts[idx].visible = currentPosts[idx].visible === false ? true : false; await savePostsToDrive(); }
async function deletePost(idx) { if(!confirm('삭제하시겠습니까?')) return; currentPosts.splice(idx, 1); await savePostsToDrive(); }

async function openEdit(idx) {
  editingPostIndex = idx; const p = currentPosts[idx];
  document.getElementById('e-title').value = p.title || ''; document.getElementById('e-date').value = p.date || ''; document.getElementById('e-desc').value = p.description || '';
  tagsData.e = [...(p.tags || [])]; renderTags('e'); attachmentsData.e = [...(p.attachments || [])]; renderAttachments('e');
  
  const ed = document.getElementById('e-editor'); ed.innerHTML = '불러오는 중...';
  document.getElementById('edit-overlay').classList.add('show');
  
  try {
    const fileId = await getDriveFileId(p.file);
    if(fileId) {
      const res = await gdApiCall(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
      const html = await res.text();
      const doc = new DOMParser().parseFromString(html, 'text/html');
      const body = doc.querySelector('.post-body');
      ed.innerHTML = body ? body.innerHTML : doc.body.innerHTML;
    } else ed.innerHTML = '<div style="color:var(--error);">HTML 파일을 Drive에서 찾을 수 없습니다. (내용을 새로 작성해주세요)</div>';
  } catch(e) { ed.innerHTML = '로드 실패: ' + e.message; }
}

async function saveEdit() {
  const p = currentPosts[editingPostIndex];
  try {
    const title = document.getElementById('e-title').value, date = document.getElementById('e-date').value;
    const htmlContent = buildHtmlFile(title, date, document.getElementById('e-editor').innerHTML);
    await uploadToDrive(p.file, htmlContent, 'text/html');
    
    currentPosts[editingPostIndex] = { ...p, title, date, description: document.getElementById('e-desc').value, tags: [...tagsData.e], attachments: [...attachmentsData.e] };
    await savePostsToDrive();
    closeOverlay('edit-overlay'); alert('수정 완료!');
  } catch(e) { alert('수정 실패: ' + e.message); }
}

function closeOverlay(id) { document.getElementById(id).classList.remove('show'); }
</script>
</body>
