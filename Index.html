<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Insight Blog — 투자 리서치 & 분석</title>
  <meta name="description" content="주식 분석, 시장 리포트, 투자 전략을 담은 개인 투자 리서치 블로그" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background-color: #0d0d0f; color: #e5e7eb; font-family: 'Pretendard', sans-serif; min-height: 100vh; }
    .gradient-text { background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #818cf8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero-glow { position: absolute; top: -120px; left: 50%; transform: translateX(-50%); width: 700px; height: 400px; background: radial-gradient(ellipse, rgba(99,102,241,0.13) 0%, transparent 70%); pointer-events: none; }
    
    .tag-btn { background: #1a1a1e; color: #9ca3af; border: 1px solid #252529; transition: all .15s; }
    .tag-btn:hover { background: #252529; color: #e5e7eb; border-color: #3a3a42; }
    .tag-btn.active { background: rgba(99,102,241,.18); color: #a5b4fc; border-color: rgba(99,102,241,.45); }
    
    .post-card { background: #1a1a1e; border: 1px solid #252529; transition: border-color .2s, transform .2s; }
    .post-card:hover { border-color: rgba(99,102,241,.6); transform: translateY(-3px); }
    
    .stat-item { background: #1a1a1e; border: 1px solid #252529; border-radius: 12px; padding: .75rem 1.25rem; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    
    .post-link-btn { display: inline-flex; align-items: center; gap: .4rem; padding: .3rem .75rem; border-radius: 9999px; font-size: .72rem; font-weight: 600; background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.3); text-decoration: none; transition: background .15s; width: fit-content; }
    .post-link-btn:hover { background: rgba(99,102,241,.22); }
    
    /* 전체화면 로딩 */
    #loading-overlay { position:fixed; inset:0; background:#0d0d0f; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .spinner { border: 3px solid rgba(99,102,241,0.3); border-top-color: #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom:1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-overlay" style="display:none;">
    <div class="spinner"></div>
    <div style="color:#6b7280; font-size:0.9rem;" id="loading-text">게시물 불러오는 중...</div>
  </div>

  <header style="border-bottom:1px solid #1e1e22; position:sticky; top:0; z-index:50; background:rgba(13,13,15,.9); backdrop-filter:blur(12px);">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="Index.html" class="flex items-center gap-2.5">
        <div style="width:28px; height:28px; background:linear-gradient(135deg,#6366f1,#a78bfa); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:#fff;">M</div>
        <span style="font-size:1rem; font-weight:700; color:#fff;">My Insight Blog</span>
      </a>
      <a href="admin.html" style="font-size:.85rem; color:#6b7280; text-decoration:none;">⚙️ Admin</a>
    </div>
  </header>

  <section style="position:relative; overflow:hidden; padding:5rem 1.5rem 4rem; text-align:center;">
    <div class="hero-glow"></div>
    <div style="position:relative; max-width:680px; margin:0 auto;">
      <h1 style="font-size:clamp(2.2rem,6vw,3.5rem); font-weight:800; line-height:1.15; margin-bottom:1.25rem;" class="gradient-text">
        My Insight Blog
      </h1>
      <p style="font-size:1rem; color:#6b7280; line-height:1.75; max-width:480px; margin:0 auto 2.5rem;">
        구글 드라이브 CMS 기반의 실시간 블로그입니다.
      </p>
      <div id="stats-bar" class="flex items-center justify-center gap-3 flex-wrap"></div>
    </div>
  </section>

  <main class="max-w-5xl mx-auto px-6 pb-20">
    <div class="flex items-center flex-wrap gap-2 px-4 py-3 mb-8" style="background:#131316; border:1px solid #252529; border-radius:14px;" id="tag-filters">
      <span style="font-size:.68rem; font-weight:700; color:#4b5563; margin-right:.25rem;">카테고리</span>
    </div>
    
    <div id="no-results" class="hidden text-center py-20" style="color:#4b5563;">글이 없습니다.</div>
    <div id="posts-grid" class="grid gap-4 md:grid-cols-2"></div>
  </main>

  <script>
    // =========================================================================
    // 새로 발급받으신 API 키를 적용했습니다.
    // =========================================================================
    const GD_API_KEY = "AIzaSyDPLApCbnHSfMRhgrGoaYv5k5PX_hwoikM"; 
    const GD_FOLDER_ID = '1CSlRvNALl15uFVR1VA1yETVxQRWwU9Z1';

    let allPosts = [];

    // URL 파라미터 확인: ?post=파일명.html 이면 해당 글 렌더링
    const urlParams = new URLSearchParams(window.location.search);
    const viewPostFile = urlParams.get('post');

    if (viewPostFile) {
      renderSinglePostFromDrive(viewPostFile);
    } else {
      loadPosts();
    }

    // ── 1. 구글 드라이브에서 posts.json 읽어오기 ──
    async function loadPosts() {
      if (!GD_API_KEY) {
        document.getElementById('posts-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem 0;color:#ef4444;font-size:1.2rem;font-weight:bold;">⚠️ Index.html 파일 안에 구글 드라이브 API 키를 입력해주세요!</div>';
        return;
      }

      try {
        const q = encodeURIComponent(`name='posts.json' and '${GD_FOLDER_ID}' in parents and trashed=false`);
        const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&key=${GD_API_KEY}`);
        const searchData = await searchRes.json();
        
        if (searchData.files && searchData.files.length > 0) {
          const fileId = searchData.files[0].id;
          const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${GD_API_KEY}`);
          allPosts = (await res.json()).filter(p => p.visible !== false);
        } else {
          // 백업: 드라이브에 접근할 수 없을 경우 로컬 서버에서 기존 글 로드
          const res = await fetch('posts.json');
          if(res.ok) allPosts = (await res.json()).filter(p => p.visible !== false);
        }
        
        renderStats(); buildTagFilters(); renderPosts(allPosts);
      } catch (e) {
        document.getElementById('posts-grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;">오류: ${e.message}</div>`;
      }
    }

    // ── 2. 특정 게시글 HTML 가져와 렌더링하기 ──
    async function renderSinglePostFromDrive(filename) {
      document.getElementById('loading-overlay').style.display = 'flex';
      try {
        const q = encodeURIComponent(`name='${filename}' and '${GD_FOLDER_ID}' in parents and trashed=false`);
        const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&key=${GD_API_KEY}`);
        const searchData = await searchRes.json();
        
        if (searchData.files && searchData.files.length > 0) {
          // 1) 구글 드라이브에서 새 글 가져오기
          const fileId = searchData.files[0].id;
          const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media&key=${GD_API_KEY}`);
          let html = await res.text();
          
          // CSS 경로 호환성 처리
          html = html.replace(/href="\.\.\/style\.css"/g, 'href="style.css"');
          html = html.replace(/href="\.\.\/Index\.html"/g, 'href="Index.html"');
          
          document.open(); document.write(html); document.close();
        } else {
          // 2) 만약 드라이브에 없다면 예전 경로 (posts/폴더) 에 있는 기존 글로 백업 로드
          const res = await fetch('posts/' + filename);
          if (res.ok) {
            const html = await res.text();
            document.open(); document.write(html); document.close();
          } else {
            alert("게시글을 드라이브나 로컬 서버에서 찾을 수 없습니다.");
            location.href = 'Index.html';
          }
        }
      } catch (e) {
        alert("게시글을 불러오는 데 실패했습니다.");
        location.href = 'Index.html';
      }
    }

    // ── UI 렌더링 함수들 ──
    function renderStats() {
      const tags = new Set();
      allPosts.forEach(p => (p.tags || []).forEach(t => tags.add(t)));
      document.getElementById('stats-bar').innerHTML = `
        <div class="stat-item"><span style="font-size:1.1rem;font-weight:700;">${allPosts.length}</span><span style="font-size:.72rem;color:#6b7280;margin-left:.4rem;">포스트</span></div>
        <div class="stat-item"><span style="font-size:1.1rem;font-weight:700;">${tags.size}</span><span style="font-size:.72rem;color:#6b7280;margin-left:.4rem;">카테고리</span></div>
      `;
    }

    function buildTagFilters() {
      const tagSet = new Set(['전체']);
      allPosts.forEach(p => (p.tags || []).forEach(t => tagSet.add(t)));
      const container = document.getElementById('tag-filters');
      tagSet.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn px-4 py-1.5 rounded-full text-sm font-medium' + (tag === '전체' ? ' active' : '');
        btn.dataset.tag = tag; btn.textContent = tag;
        btn.onclick = () => filterPosts(tag);
        container.appendChild(btn);
      });
    }

    function filterPosts(tag) {
      document.querySelectorAll('.tag-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === tag));
      renderPosts(tag === '전체' ? allPosts : allPosts.filter(p => (p.tags || []).includes(tag)));
    }

    function renderPosts(posts) {
      const grid = document.getElementById('posts-grid');
      if (!posts.length) { grid.innerHTML = ''; document.getElementById('no-results').classList.remove('hidden'); return; }
      document.getElementById('no-results').classList.add('hidden');
      
      grid.innerHTML = posts.map((post, i) => {
        const isFeatured = i === 0 && posts.length > 1;
        // 경로 제거 (순수 파일 이름만 추출)
        const filename = post.file.includes('/') ? post.file.split('/').pop() : post.file;
        
        let attachmentsHtml = '';
        if (post.attachments && post.attachments.length > 0) {
          attachmentsHtml = `<div style="margin-top:.75rem; display:flex; flex-direction:column; gap:.3rem;" onclick="event.stopPropagation()">
            ${post.attachments.map(a => {
              let icon = '🔗';
              if (/youtube\.com|youtu\.be/i.test(a.url)) icon = '▶️';
              else if (/docs\.google\.com\/presentation/i.test(a.url)) icon = '📊';
              return `<a href="${a.url}" target="_blank" rel="noopener" class="post-link-btn">${icon} ${a.title}</a>`;
            }).join('')}
          </div>`;
        }

        return `
        <article class="post-card rounded-2xl p-6 cursor-pointer${isFeatured ? ' md:col-span-2' : ''}" onclick="location.href='?post=${filename}'">
          <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:1rem;">
            <div style="flex:1; min-width:0;">
              <div style="display:flex; align-items:center; gap:.6rem; margin-bottom:.75rem; flex-wrap:wrap;">
                <time style="font-size:.72rem; color:#6b7280; font-family:monospace;">${post.date}</time>
                ${(post.tags||[]).map(t=>`<span style="padding:.2rem .65rem;border-radius:9999px;font-size:.7rem;font-weight:500;background:rgba(99,102,241,.14);color:#a5b4fc;border:1px solid rgba(99,102,241,.28);">${t}</span>`).join('')}
              </div>
              <h2 style="font-size:${isFeatured?'1.25rem':'1rem'};font-weight:700;color:#f3f4f6;margin-bottom:.5rem;line-height:1.4;">${post.title}</h2>
              <p style="font-size:.85rem;color:#6b7280;line-height:1.65;" class="line-clamp-2">${post.description}</p>
              ${attachmentsHtml}
            </div>
            <span style="font-size:1rem;color:#6366f1;flex-shrink:0;margin-top:.25rem;">→</span>
          </div>
        </article>`;
      }).join('');
    }
  </script>
</body>
</html>
