<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <style>
    body{background:#0d0d0f;color:#e5e7eb;font-family:'Pretendard',sans-serif;line-height:1.8;padding:2rem 1rem 4rem}
    .post-wrap{max-width:760px;margin:0 auto}
    .back-link{display:inline-flex;align-items:center;gap:.4rem;color:#6b7280;text-decoration:none;font-size:.82rem;margin-bottom:2rem;border:1px solid #252529;padding:.35rem .85rem;border-radius:9999px;transition:all .15s}
    .back-link:hover{color:#e5e7eb;border-color:#3f3f46}
    .post-header{margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid #252529}
    .post-date{font-size:.8rem;color:#6b7280;font-family:monospace;margin-bottom:.6rem}
    .post-title{font-size:1.85rem;font-weight:800;color:#f3f4f6;line-height:1.35;margin-bottom:.75rem}
    .post-desc{font-size:.9rem;color:#9ca3af;line-height:1.65;margin-bottom:.85rem}
    .post-tags{display:flex;flex-wrap:wrap;gap:.4rem}
    .post-tag{font-size:.72rem;padding:.2rem .6rem;border-radius:9999px;background:rgba(99,102,241,.14);color:#a5b4fc;border:1px solid rgba(99,102,241,.28)}
    .post-body{font-size:.95rem;line-height:1.85}
    .post-body h2{font-size:1.25rem;font-weight:700;margin:2rem 0 .6rem;color:#f3f4f6;border-bottom:1px solid #252529;padding-bottom:.4rem}
    .post-body h3{font-size:1.05rem;font-weight:700;margin:1.5rem 0 .5rem;color:#e5e7eb}
    .post-body p{margin:.65rem 0}
    .post-body ul,.post-body ol{margin:.65rem 0;padding-left:1.5rem}
    .post-body li{margin:.3rem 0}
    .post-body a{color:#818cf8;text-decoration:underline}
    .post-body a:hover{color:#a5b4fc}
    .post-body blockquote{border-left:3px solid #6366f1;padding-left:1rem;color:#9ca3af;margin:1rem 0;font-style:italic}
    .post-body img{max-width:100%;border-radius:10px;margin:1rem 0;display:block}
    .embed-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:12px;margin:1.25rem 0;background:#000}
    .embed-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:12px}
    .link-card{display:flex;align-items:center;gap:.85rem;background:#1a1a1e;border:1px solid rgba(99,102,241,.3);border-radius:12px;padding:.85rem 1rem;margin:.65rem 0}.link-card-icon{font-size:1.4rem;flex-shrink:0}.link-card-info{flex:1;min-width:0}.link-card-label{font-size:.78rem;font-weight:600;color:#e5e7eb;margin-bottom:.35rem}.link-card-btn{display:inline-block;font-size:.75rem;font-weight:700;color:#818cf8;text-decoration:none;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:7px;padding:.25rem .65rem;transition:all .15s}.link-card-btn:hover{background:rgba(99,102,241,.22)}
  </style>
</head>

  </div>
</body>
</html>
